name: IDOP Continuous Integration (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# =========================================================================
# CI PIPELINE OVERVIEW
# =========================================================================
# This workflow runs on every push/PR to main and performs:
#   Job 1 (lint-and-test): Code quality audit + offline unit tests
#   Job 2 (verify-docker-syntax): Docker image build verification (no push)
#
# ⚠️ This workflow does NOT require any GitHub Secrets.
#    All tests run in offline/mock mode with ENV_STATE=testing.
#    Secrets are only needed by the CD pipeline (cd.yml).
# =========================================================================

jobs:
  # =========================================================================
  # JOB 1: CODE QUALITY AUDIT AND OFFLINE TESTING
  # =========================================================================
  lint-and-test:
    name: "Job 1: Lint & Pytest Suite"
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # STEP 1: DISK SPACE OPTIMIZATION
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 1/7: Free up disk space"
        run: |
          echo "=========================================="
          echo "🧹 DISK SPACE OPTIMIZATION"
          echo "=========================================="
          echo ""
          echo "📊 Disk space BEFORE cleanup:"
          df -h /
          echo ""

          # Remove heavy pre-installed development frameworks
          echo "🗑️ Removing heavy pre-installed software..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          # Clean Docker structures
          echo "🐳 Pruning Docker system..."
          docker system prune -af --volumes || true

          # Clean package managers
          echo "📦 Flushing package caches..."
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo ""
          echo "📊 Disk space AFTER cleanup:"
          df -h /
          echo "✅ Runner workspace optimized!"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 2: CHECKOUT SOURCE CODE
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 2/7: Checkout code"
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # STEP 3: PRINT CI METADATA & CONFIGURATION
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 3/7: Print CI metadata"
        run: |
          echo "=========================================="
          echo "🚀 IDOP CI PIPELINE — BUILD INITIATED"
          echo "=========================================="
          echo ""
          echo "📋 Git & Trigger Info:"
          echo "  Commit SHA   : ${{ github.sha }}"
          echo "  Short SHA    : $(echo '${{ github.sha }}' | cut -c1-7)"
          echo "  Triggered By : ${{ github.actor }}"
          echo "  Repository   : ${{ github.repository }}"
          echo "  Workflow     : ${{ github.workflow }}"
          echo "  Run Number   : ${{ github.run_number }}"
          echo "  Event        : ${{ github.event_name }}"
          echo "=========================================="
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 4: SETUP PYTHON RUNTIME + INSTALL DEPENDENCIES
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 4/7: Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: "Step 4b/7: Install system libraries"
        run: |
          echo "📦 Installing system dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libmagic1
          echo "✅ System libraries installed!"
          echo ""

      - name: "Step 4c/7: Install Python dependencies"
        run: |
          echo "📦 Upgrading pip and installing workspace packages..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-asyncio ruff black
          echo ""
          echo "✅ Python dependencies installed!"
          echo "   Python version: $(python --version)"
          echo "   Pip version:    $(pip --version)"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 5: CODE QUALITY CHECKS (RUFF + BLACK)
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 5/7: Lint with Ruff"
        run: |
          echo "🔍 Running Ruff code quality audit..."
          ruff check app/
          echo "✅ Ruff audit complete."
          echo ""

      - name: "Step 5b/7: Format check with Black"
        run: |
          echo "🔍 Checking code formatting with Black..."
          black --check app/
          echo "✅ Black format check complete."
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 6: RUN PYTEST TEST SUITE (OFFLINE / MOCKED)
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 6/7: Run Pytest test suite"
        env:
          ENV_STATE: testing
        run: |
          echo "=========================================="
          echo "🧪 RUNNING OFFLINE UNIT TEST SUITE"
          echo "=========================================="
          echo "   ENV_STATE: testing (all API calls mocked)"
          echo ""
          pytest tests/ -v --tb=short
          echo ""
          echo "✅ All tests passed!"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 7: CI COMPLETION SUMMARY
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 7/7: CI summary"
        run: |
          echo "=========================================="
          echo "✅ CI PIPELINE COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo ""
          echo "📋 Results:"
          echo "  ✅ Ruff lint check    : Passed"
          echo "  ✅ Black format check : Passed"
          echo "  ✅ Pytest suite       : Passed"
          echo ""
          echo "Next: CD pipeline will build and deploy if this is a push to main."
          echo "=========================================="

  # =========================================================================
  # JOB 2: DOCKER IMAGE BUILD VERIFICATION (ZERO-RISK, NO PUSH)
  # =========================================================================
  verify-docker-build:
    name: "Job 2: Docker Build Verification"
    needs: [lint-and-test]
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # STEP 1: DISK SPACE OPTIMIZATION
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 1/5: Free up disk space"
        run: |
          echo "🧹 Optimizing disk space for Docker build..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af --volumes || true
          echo "✅ Disk space optimized!"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 2: CHECKOUT SOURCE CODE
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 2/5: Checkout code"
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      # STEP 3: VERIFY DOCKER INSTALLATION
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 3/5: Verify Docker installation"
        run: |
          echo "⚙️ Docker environment:"
          docker version
          echo ""
          echo "✅ Docker daemon ready!"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 4: SETUP BUILDX + QEMU
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 4a/5: Set up QEMU"
        uses: docker/setup-qemu-action@v3

      - name: "Step 4b/5: Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────────────────────────────
      # STEP 5: BUILD DOCKER IMAGE (LOCAL ONLY, NO PUSH)
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 5/5: Build Docker image (linux/amd64)"
        run: |
          echo "=========================================="
          echo "🔨 BUILDING DOCKER IMAGE (VERIFICATION ONLY)"
          echo "=========================================="
          echo "   Platform: linux/amd64"
          echo "   Dockerfile: ./Dockerfile"
          echo "   ⚠️ This is a build-only check. Image is NOT pushed."
          echo ""
          docker build --platform linux/amd64 -f Dockerfile -t idop-app:ci-check .
          echo ""
          echo "✅ Docker image compiled successfully with 0 errors!"
          echo ""
          echo "📋 Image details:"
          docker images idop-app:ci-check
          echo "=========================================="
