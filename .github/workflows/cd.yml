name: IDOP Continuous Deployment (CD)

on:
  workflow_run:
    workflows: ["IDOP Continuous Integration (CI)"]
    types: [completed]
    branches: [main]

# =========================================================================
# GLOBAL ENVIRONMENT VARIABLES
# =========================================================================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node.js 24 before June 2026 deadline
  AWS_REGION: us-east-1                     # Target AWS region matching your ECR repository
  ECR_REPOSITORY: idop-app                   # Name of your ECR repository
  EC2_PROJECT_PATH: /home/ubuntu/IDOP        # Directory path on the EC2 host containing docker-compose.yml

# =========================================================================
# REQUIRED REPOSITORY SECRETS
# =========================================================================
# Navigate to: GitHub → Repository → Settings → Secrets and variables → Actions
# Click "New repository secret" for each entry below.
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 🔐 CATEGORY 1: AWS / ECR CLOUD CREDENTIALS                            │
# ├──────────────────────────┬─────────────────────────────────────────────┤
# │ AWS_ACCESS_KEY_ID        │ IAM User Access Key (starts with AKIA...)   │
# │                          │ Source: IAM → Users → Security credentials  │
# │                          │ Permissions: ECR read/write (S3 cache uses  │
# │                          │ EC2 instance role, not this user)           │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ AWS_SECRET_ACCESS_KEY    │ IAM User Secret Access Key                  │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ ECR_REGISTRY             │ ECR Registry ROOT URL (no repo name!)       │
# │                          │ Example: 221691784496.dkr.ecr.us-east-1.     │
# │                          │          amazonaws.com                      │
# │                          │ ⚠️ Do NOT include /idop-app at the end      │
# └──────────────────────────┴─────────────────────────────────────────────┘
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 🔐 CATEGORY 2: EC2 SERVER CONNECTION                                   │
# ├──────────────────────────┬─────────────────────────────────────────────┤
# │ EC2_HOST                 │ Public IPv4 address or Elastic IP of EC2    │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ EC2_SSH_KEY              │ FULL contents of your .pem key file         │
# │                          │ Must include -----BEGIN/END RSA PRIVATE     │
# │                          │ KEY----- headers and all base64 lines       │
# └──────────────────────────┴─────────────────────────────────────────────┘
#
#   ℹ️ The internal checkpoint-db Postgres password (idop_checkpoint_2026) is
#      defined ONCE in the .env heredoc and referenced by docker-compose.yml via
#      variable substitution (${POSTGRES_PASSWORD}). The .env file is the single
#      source of truth. This prevents password mismatches when volumes persist.
#      checkpoint-db has no exposed ports — only reachable from inside the
#      Docker network. Do NOT set POSTGRES_PASSWORD as a GitHub secret.
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │ 🔐 CATEGORY 3: APPLICATION API KEYS & INTEGRATIONS                     │
# ├──────────────────────────┬─────────────────────────────────────────────┤
# │ OPENAI_API_KEY           │ OpenAI API Key (sk-proj-...)                │
# │                          │ Source: https://platform.openai.com/api-keys │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ VOYAGE_API_KEY           │ Voyage AI API Key                           │
# │                          │ Source: https://dash.voyageai.com/          │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ TAVILY_API_KEY           │ Tavily Search API Key (tvly-...)            │
# │                          │ Source: https://tavily.com/                 │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ QDRANT_URL               │ Qdrant Cloud cluster endpoint URL           │
# │                          │ Example: https://xyz.aws.cloud.qdrant.io    │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ QDRANT_API_KEY           │ Qdrant Cloud authorization token            │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ SUPABASE_DB_URL          │ Supabase PostgreSQL connection URL          │
# │                          │ Format: postgresql+psycopg://postgres.ref:  │
# │                          │         pass@host:5432/postgres             │
# │                          │ ⚠️ Use Session Pooler, NOT Direct connection│
# └──────────────────────────┴─────────────────────────────────────────────┘
#
# ┌──────────────────────────────────────────────────────────────────────────┐
# │ ⬜ CATEGORY 4: OPTIONAL CACHING SECRETS                                │
# ├──────────────────────────┬─────────────────────────────────────────────┤
# │ UPSTASH_REDIS_URL        │ Upstash Redis REST connection URL           │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ UPSTASH_REDIS_TOKEN      │ Upstash Redis authentication token          │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ S3_CACHE_BUCKET          │ AWS S3 bucket name for document cache       │
# │                          │ Example: idop-cache-221691784496            │
# ├──────────────────────────┼─────────────────────────────────────────────┤
# │ DOMAIN_NAME              │ Optional domain name for SSL setup          │
# │                          │ Example: api.idop.example.com               │
# └──────────────────────────┴─────────────────────────────────────────────┘
# =========================================================================

jobs:
  # =========================================================================
  # JOB 1: BUILD, PUBLISH TO ECR, AND DEPLOY TO EC2
  # =========================================================================
  deploy:
    name: Build → ECR → Deploy EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # STEP 0: VERIFY CI WORKFLOW PASSED
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 0/13: Verify CI workflow passed"
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            if (!workflowRun) {
              core.warning('No workflow_run payload — possibly triggered manually');
              return;
            }
            if (workflowRun.conclusion !== 'success') {
              core.setFailed(`CI workflow failed (${workflowRun.conclusion}). Aborting deployment.`);
            } else {
              console.log(`CI workflow passed! (SHA: ${workflowRun.head_sha})`);
            }

      # ─────────────────────────────────────────────────────────────────────
      # STEP 1: DISK SPACE OPTIMIZATION
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 1/13: Free up disk space"
        run: |
          echo "=========================================="
          echo "📊 Disk space BEFORE cleanup:"
          df -h /
          echo ""

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af --volumes || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo ""
          echo "📊 Disk space AFTER cleanup:"
          df -h /
          echo "✅ Disk space optimization complete!"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 2: CHECKOUT + RESOLVE ECR VARIABLES
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 2/13: Checkout code"
        uses: actions/checkout@v4

      - name: "Step 2b/13: Resolve ECR Registry Variables"
        run: |
          echo "=========================================="
          echo "🔍 RESOLVING ECR REGISTRY AND REPOSITORY"
          echo "=========================================="
          REGISTRY_VAL="${{ secrets.ECR_REGISTRY }}"
          if [[ "$REGISTRY_VAL" == *"/"* ]]; then
            ECR_REGISTRY_HOST=$(echo "$REGISTRY_VAL" | cut -d'/' -f1)
            ECR_REPO_NAME=$(echo "$REGISTRY_VAL" | cut -d'/' -f2-)
          else
            ECR_REGISTRY_HOST="$REGISTRY_VAL"
            ECR_REPO_NAME="${{ env.ECR_REPOSITORY }}"
          fi
          echo "RESOLVED_ECR_REGISTRY=$ECR_REGISTRY_HOST" >> $GITHUB_ENV
          echo "RESOLVED_ECR_REPOSITORY=$ECR_REPO_NAME" >> $GITHUB_ENV
          echo "  Resolved Registry Host : $ECR_REGISTRY_HOST"
          echo "  Resolved Repository    : $ECR_REPO_NAME"
          echo "=========================================="

      # ─────────────────────────────────────────────────────────────────────
      # STEP 3: PRINT DEPLOYMENT METADATA
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 3/13: Print deployment metadata"
        run: |
          echo "=========================================="
          echo "🚀 IDOP CD PIPELINE — DEPLOYMENT INITIATED"
          echo "=========================================="
          echo ""
          echo "📋 Git & Trigger Info:"
          echo "  Commit SHA : ${{ github.sha }}"
          echo "  Author     : ${{ github.actor }}"
          echo "  Repository : ${{ github.repository }}"
          echo "  Run Number : ${{ github.run_number }}"
          echo ""
          echo "📋 Target Configuration:"
          echo "  AWS Region   : $AWS_REGION"
          echo "  ECR Repo     : $RESOLVED_ECR_REPOSITORY"
          echo "  ECR Registry : $RESOLVED_ECR_REGISTRY"
          echo "  EC2 Host     : ${{ secrets.EC2_HOST }}"
          echo "  Host Path    : $EC2_PROJECT_PATH"
          echo "  Platform     : linux/amd64"
          echo "=========================================="
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 4: CONFIGURE AWS CREDENTIALS
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 4/13: Configure AWS credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ─────────────────────────────────────────────────────────────────────
      # STEP 5: VERIFY AWS IDENTITY
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 5/13: Verify AWS identity (STS)"
        run: |
          echo "🔍 Verifying AWS IAM connection identity..."
          aws sts get-caller-identity
          echo ""
          echo "✅ AWS credentials verified successfully!"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 6: LOGIN TO AMAZON ECR
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 6/13: Login to Amazon ECR"
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "Step 6b/13: Verify ECR login"
        run: |
          echo "✅ Authenticated with Amazon ECR!"
          echo "  Registry: ${{ steps.login-ecr.outputs.registry }}"
          echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 7: SETUP QEMU
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 7/13: Set up QEMU"
        uses: docker/setup-qemu-action@v3

      # ─────────────────────────────────────────────────────────────────────
      # STEP 8: SETUP DOCKER BUILDX
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 8/13: Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      # ─────────────────────────────────────────────────────────────────────
      # STEP 9: BUILD, TAG, AND PUSH DOCKER IMAGE TO ECR
      # ─────────────────────────────────────────────────────────────────────
      # GIT_COMMIT_SHA is passed as a build arg so it's baked into the image
      # as an environment variable (see Dockerfile ARG/ENV). This provides a
      # second source for the value beyond the .env file on EC2.
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 9/13: Build, tag, push Docker image to ECR"
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.RESOLVED_ECR_REGISTRY }}/${{ env.RESOLVED_ECR_REPOSITORY }}:latest
            ${{ env.RESOLVED_ECR_REGISTRY }}/${{ env.RESOLVED_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.RESOLVED_ECR_REGISTRY }}/${{ env.RESOLVED_ECR_REPOSITORY }}:stable

      # ─────────────────────────────────────────────────────────────────────
      # STEP 10: SAVE IMAGE DIGEST FOR VERIFICATION
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 10/13: Save image digest"
        run: |
          DIGEST="${{ steps.build-push.outputs.digest }}"
          echo "=========================================="
          echo "✅ DOCKER IMAGE PUBLISHED TO AWS ECR"
          echo "=========================================="
          echo "  Registry     : $RESOLVED_ECR_REGISTRY"
          echo "  Repository   : $RESOLVED_ECR_REPOSITORY"
          echo "  Tags         : latest, ${{ github.sha }}"
          echo "  Architecture : linux/amd64"
          echo "  Digest       : $DIGEST"
          echo "=========================================="
          echo ""
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────────────────────────
      # STEP 11: DEPLOY TO EC2 VIA SSH
      #
      # FIXES:
      #   ✅ envs: single-line (no YAML folding) — all secrets forwarded correctly
      #   ✅ compose down BEFORE prune — frees old image layers (~1.66GB)
      #   ✅ EBS auto-resize before pull — resists disk space exhaustion
      #   ✅ :stable tagged BEFORE stopping containers — points to current deploy
      #   ✅ :stable pushed to ECR for true remote rollback
      #   ✅ Rollback pulls :stable from ECR (not local tag which may be pruned)
      #   ✅ Health check: 30s initial + 30 retries × 6s = 210s total
      #   ✅ compose down -v on stale pgdata password mismatch
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 11/13: Deploy to EC2 via SSH"
        uses: appleboy/ssh-action@v1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          # Opik observability — hardcoded directly (no GitHub secret)
          OPIK_API_KEY: muDw2J5DzTHuSVKvpOWGWiAP3
          OPIK_PROJECT_NAME: idop-Project
          OPIK_WORKSPACE: idop-workspace
          RESOLVED_ECR_REGISTRY: ${{ env.RESOLVED_ECR_REGISTRY }}
          RESOLVED_ECR_REPOSITORY: ${{ env.RESOLVED_ECR_REPOSITORY }}
          EC2_PROJECT_PATH: ${{ env.EC2_PROJECT_PATH }}
          AWS_REGION: ${{ env.AWS_REGION }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_DIGEST: ${{ env.IMAGE_DIGEST }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # IMPORTANT: envs is a SINGLE-LINE comma-separated string.
          # Do NOT use >- YAML folding — it inserts spaces between lines,
          # causing env var names like " OPENAI_API_KEY" (with leading space)
          # that won't match the actual env var names.
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,OPENAI_API_KEY,VOYAGE_API_KEY,TAVILY_API_KEY,QDRANT_URL,QDRANT_API_KEY,UPSTASH_REDIS_URL,UPSTASH_REDIS_TOKEN,SUPABASE_DB_URL,S3_CACHE_BUCKET,DOMAIN_NAME,OPIK_API_KEY,OPIK_PROJECT_NAME,OPIK_WORKSPACE,RESOLVED_ECR_REGISTRY,RESOLVED_ECR_REPOSITORY,EC2_PROJECT_PATH,AWS_REGION,GITHUB_SHA,IMAGE_DIGEST
          script: |
            echo "=========================================="
            echo "📂 Step 11a: Preparing deployment directory"
            echo "=========================================="
            mkdir -p $EC2_PROJECT_PATH
            cd $EC2_PROJECT_PATH
            echo "✅ Working directory: $(pwd)"
            echo ""

            echo "=========================================="
            echo "🛠️ Step 11b: Verifying system dependencies"
            echo "=========================================="
            sudo apt-get update -y
            sudo apt-get install -y zip unzip curl gnupg ca-certificates lsb-release lsof

            # Install Docker if missing
            if ! command -v docker &> /dev/null; then
              echo "🐳 Installing Docker Engine..."
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor --yes -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker ubuntu
              echo "✅ Docker installed: $(docker --version)"
            else
              echo "🐳 Docker already installed: $(docker --version)"
            fi

            # Install Docker Compose plugin if missing
            if ! docker compose version &> /dev/null && ! sudo docker compose version &> /dev/null; then
              echo "🐳 Installing Docker Compose plugin..."
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            # Determine docker command wrapper (handles group permissions delay)
            DOCKER_CMD="docker"
            if ! docker ps &> /dev/null; then
              echo "⚠️ Using 'sudo docker' wrapper (group permissions not active)"
              DOCKER_CMD="sudo docker"
            fi

            COMPOSE_CMD="$DOCKER_CMD compose"
            if ! $COMPOSE_CMD version &> /dev/null; then
              if command -v docker-compose &> /dev/null; then
                COMPOSE_CMD="docker-compose"
              else
                COMPOSE_CMD="sudo docker-compose"
              fi
            fi

            echo "🐳 Docker Command: $DOCKER_CMD"
            echo "🐳 Compose Command: $COMPOSE_CMD"
            echo ""

            # Install AWS CLI if missing
            if ! command -v aws &> /dev/null; then
              echo "📦 Installing AWS CLI v2..."
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip -o awscliv2.zip &> /dev/null
              sudo ./aws/install --update
              rm -rf aws awscliv2.zip
              echo "✅ AWS CLI installed: $(aws --version)"
            else
              echo "📦 AWS CLI already installed: $(aws --version)"
            fi
            echo ""

            echo "=========================================="
            echo "🌐 Step 11c: Setting up Nginx reverse proxy"
            echo "=========================================="
            if ! command -v nginx &> /dev/null; then
              echo "🌐 Installing Nginx..."
              sudo apt-get update -y
              sudo apt-get install -y nginx
            fi

            sudo rm -f /etc/nginx/sites-enabled/default

            # Get public IP dynamically (IMDSv2 → IMDSv1 → ipify → catch-all _)
            IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null)
            if [ -n "$IMDS_TOKEN" ]; then
              EC2_PUBLIC_IP=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
            else
              EC2_PUBLIC_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)
            fi
            if [ -z "$EC2_PUBLIC_IP" ]; then
              EC2_PUBLIC_IP=$(curl -s https://api.ipify.org)
            fi
            if [ -z "$EC2_PUBLIC_IP" ]; then
              EC2_PUBLIC_IP="_"
            fi
            echo "🌐 Public IP: $EC2_PUBLIC_IP"

            sudo tee /etc/nginx/sites-available/idop.conf << NGINXEOF
            server {
                listen 80;
                server_name $EC2_PUBLIC_IP;

                client_max_body_size 100M;

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;

                    # Enable SSE streaming support
                    proxy_set_header Connection '';
                    proxy_http_version 1.1;
                    chunked_transfer_encoding on;
                    proxy_buffering off;
                    proxy_cache off;
                    proxy_read_timeout 24h;
                }
            }
            NGINXEOF

            sudo ln -sf /etc/nginx/sites-available/idop.conf /etc/nginx/sites-enabled/

            echo "🔍 Validating nginx configuration..."
            sudo nginx -t
            if [ $? -ne 0 ]; then
              echo "❌ Nginx configuration invalid — aborting."
              exit 1
            fi

            # Kill any process holding port 80 (e.g., Apache)
            if sudo lsof -i :80 -P -n 2>/dev/null | grep -q LISTEN; then
              OLD_PROCESS=$(sudo lsof -i :80 -P -n | grep LISTEN | awk '{print $1}' | head -1)
              echo "⚠️ Port 80 in use by '$OLD_PROCESS'. Stopping..."
              sudo systemctl stop "$OLD_PROCESS" 2>/dev/null || sudo kill -9 $(sudo lsof -t -i :80) 2>/dev/null || true
              sleep 2
            fi

            sudo systemctl enable nginx
            sudo systemctl restart nginx
            sleep 2

            if sudo lsof -i :80 -P -n 2>/dev/null | grep -q LISTEN; then
              echo "✅ Nginx listening on port 80"
            else
              echo "⚠️ Nginx not on port 80 — starting via binary..."
              sudo nginx 2>&1 || true
              sleep 2
            fi

            # Optional domain setup & Let's Encrypt SSL
            DOMAIN_NAME="$DOMAIN_NAME"
            if [ -n "$DOMAIN_NAME" ]; then
              echo "🌐 Domain detected: $DOMAIN_NAME"
              CURRENT_SERVER_NAME=$(grep "server_name" /etc/nginx/sites-available/idop.conf | awk '{print $2}' | tr -d ';')
              if [ "$CURRENT_SERVER_NAME" != "$DOMAIN_NAME" ]; then
                sudo sed -i "s/server_name .*/server_name $DOMAIN_NAME;/" /etc/nginx/sites-available/idop.conf
                sudo systemctl restart nginx
              fi
              if ! sudo test -f "/etc/letsencrypt/live/$DOMAIN_NAME/fullchain.pem"; then
                echo "🔒 Acquiring Let's Encrypt certificate..."
                sudo apt-get install -y certbot python3-certbot-nginx
                sudo certbot --nginx -d "$DOMAIN_NAME" --non-interactive --agree-tos --email webmaster@$DOMAIN_NAME || echo "⚠️ Let's Encrypt failed — check DNS."
              else
                echo "🔒 SSL certificate active!"
              fi
            fi
            echo ""

            echo "=========================================="
            echo "🔐 Step 11d: Writing production .env file"
            echo "=========================================="
            # NOTE: This heredoc is UNQUOTED (ENVEOF) so bash expands all $VARIABLE references.
            # The values are forwarded by appleboy/ssh-action via the envs parameter.
            #
            # PG_PASS is the single source of truth for the Postgres password.
            # It is used for both POSTGRES_PASSWORD (in .env) and DATABASE_URL.
            # docker-compose.yml references ${POSTGRES_PASSWORD} from .env via
            # Docker Compose variable substitution — no hardcoding.
            PG_PASS=idop_checkpoint_2026
            cat << ENVEOF > .env
            # ─────────────────────────────────────────────────────────
            # IDOP RUNTIME PRODUCTION SECRETS
            # Auto-generated by GitHub Actions CD Pipeline
            # Commit: $GITHUB_SHA
            # ⚠️ DO NOT EDIT MANUALLY — overwritten on next deploy
            # ─────────────────────────────────────────────────────────

            # Runtime state
            ECR_REGISTRY=$RESOLVED_ECR_REGISTRY
            ECR_REPOSITORY=$RESOLVED_ECR_REPOSITORY

            # Internal PostgreSQL (LangGraph checkpointing)
            # Password is defined once here — referenced by docker-compose.yml
            POSTGRES_PASSWORD=$PG_PASS
            DATABASE_URL=postgresql://postgres:$PG_PASS@checkpoint-db:5432/idop_memories

            # OpenAI
            OPENAI_API_KEY=$OPENAI_API_KEY

            # Voyage AI
            VOYAGE_API_KEY=$VOYAGE_API_KEY

            # Tavily
            TAVILY_API_KEY=$TAVILY_API_KEY

            # Qdrant Cloud
            QDRANT_URL=$QDRANT_URL
            QDRANT_API_KEY=$QDRANT_API_KEY

            # Upstash Redis (optional)
            UPSTASH_REDIS_URL=$UPSTASH_REDIS_URL
            UPSTASH_REDIS_TOKEN=$UPSTASH_REDIS_TOKEN

            # Supabase
            SUPABASE_DB_URL=$SUPABASE_DB_URL

            # AWS S3
            AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            AWS_REGION=$AWS_REGION
            S3_CACHE_BUCKET=$S3_CACHE_BUCKET
            STORAGE_BACKEND=s3

            # Opik Observability
            OPIK_API_KEY=$OPIK_API_KEY
            OPIK_PROJECT_NAME=$OPIK_PROJECT_NAME
            OPIK_WORKSPACE=$OPIK_WORKSPACE

            # Runtime state
            ENVIRONMENT=production

            # Git commit SHA (also baked into image via Docker build-arg)
            GIT_COMMIT_SHA=$GITHUB_SHA
            ENVEOF

            chmod 600 .env
            echo "✅ .env file created (chmod 600)"
            echo ""
            echo "  Password source: bash variable PG_PASS (change in one place)"
            echo ""


            echo "=========================================="
            echo "📝 Step 11e: Writing docker-compose.yml"
            echo "=========================================="
            # Quoted heredoc — variables stay literal for Docker Compose runtime expansion
            cat << 'COMPOSEEOF' > docker-compose.yml

            services:
              app:
                image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${GIT_COMMIT_SHA}
                container_name: idop-app
                restart: always
                ports:
                  - "127.0.0.1:8000:8000"
                env_file:
                  - .env
                depends_on:
                  checkpoint-db:
                    condition: service_healthy
                networks:
                  - idop-net

              checkpoint-db:
                image: postgres:15-alpine
                container_name: idop-checkpoint-db
                restart: always
                environment:
                  POSTGRES_USER: postgres
                  # Password sourced from .env (POSTGRES_PASSWORD) — single source of truth
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                  POSTGRES_DB: idop_memories
                volumes:
                  - pgdata:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d idop_memories -c 'SELECT 1' > /dev/null 2>&1"]
                  interval: 5s
                  timeout: 5s
                  retries: 30
                  start_period: 60s
                networks:
                  - idop-net
                # ⬆️ retries: 30 × 5s = 150s max + 60s start_period = 210s total
                #    This comfortably covers Postgres cold-start on t2.micro (up to 115s).

            volumes:
              pgdata:

            networks:
              idop-net:
                name: idop-net
            COMPOSEEOF
            echo "✅ docker-compose.yml written"
            echo ""

            echo "=========================================="
            echo "🔐 Step 11f: Authenticating Docker with ECR"
            echo "=========================================="
            # Write AWS credentials to config file instead of exporting shell variables
            # (avoids exposing secrets in /proc/ environment on the EC2 instance)
            aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
            aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
            aws configure set default.region "$AWS_REGION"

            aws sts get-caller-identity 2>&1 || echo "⚠️ AWS identity check failed"

            echo "🔐 Logging Docker into ECR..."
            ECR_PASSWORD=$(aws ecr get-login-password --region $AWS_REGION)
            ECR_LOGIN_EXIT=$?
            if [ $ECR_LOGIN_EXIT -ne 0 ]; then
              echo "❌ ECR login via IAM user failed. Trying instance role..."
              unset AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
              rm -f ~/.aws/credentials
              ECR_PASSWORD=$(aws ecr get-login-password --region $AWS_REGION)
              ECR_LOGIN_EXIT=$?
              if [ $ECR_LOGIN_EXIT -ne 0 ]; then
                echo "❌ Instance role ECR login also failed."
                echo "Attach AmazonEC2ContainerRegistryReadOnly to the IAM user or EC2 instance role."
                exit 1
              fi
            fi

            echo "$ECR_PASSWORD" | $DOCKER_CMD login --username AWS --password-stdin $RESOLVED_ECR_REGISTRY 2>&1
            DOCKER_LOGIN_EXIT=$?
            if [ $DOCKER_LOGIN_EXIT -ne 0 ]; then
              echo "❌ Docker login to ECR failed."
              exit 1
            fi
            echo "✅ Docker authenticated with ECR!"
            echo ""

            echo "=========================================="
            echo "💾 Step 11g: Tag current :stable + test pgdata password"
            echo "=========================================="
            # Tag the CURRENT deployed image as :stable BEFORE stopping containers.
            $DOCKER_CMD tag $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:latest \
              $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:stable 2>/dev/null && \
              echo "✅ :stable tag updated to current :latest" || \
              echo "ℹ️ No existing :latest to backup (first deployment)"

            # Test pgdata password against the RUNNING Postgres container.
            # Must happen BEFORE compose down so we can pass -v to delete stale volumes.
            USE_DOWN_V=false
            if $DOCKER_CMD ps --format '{{.Names}}' | grep -q idop-checkpoint-db; then
              echo "🔧 Checking Postgres volume password on running container..."
              # Use TCP connection (not Unix socket) to test the actual password
              PG_TEST=$($DOCKER_CMD run --rm --network idop-net \
                postgres:15-alpine psql "postgresql://postgres:$PG_PASS@checkpoint-db:5432/idop_memories" \
                -c 'SELECT 1' 2>&1 || echo "FAILED")
              if echo "$PG_TEST" | grep -q "password authentication failed"; then
                USE_DOWN_V=true
                echo "  ⚠️ Stale pgdata — password mismatch. Will delete volume."
              else
                echo "  ✅ pgdata password matches current config — preserving data"
              fi
            else
              echo "  ℹ️ No running Postgres container — will initialize fresh"
            fi
            echo ""

            # ─── STOP OLD CONTAINERS TO RELEASE IMAGE LAYERS ───
            echo "=========================================="
            echo "🛑 Step 11h: Stopping old containers to free image layers"
            echo "=========================================="
            if [ "$USE_DOWN_V" = "true" ]; then
              $COMPOSE_CMD down -v 2>&1  # -v deletes stale pgdata volume
            else
              $COMPOSE_CMD down 2>&1 || echo "  ℹ️ compose down completed"
            fi
            echo ""

            echo "=========================================="
            echo "🧹 Step 11i: Aggressive disk space cleanup (containers stopped)"
            echo "=========================================="
            df -h / | awk 'NR==1 || NR==2'

            # Containers are stopped — prune ALL unused images, build cache, networks
            # This now frees the old app image layers (~1.66GB) that were previously
            # pinned by running containers
            $DOCKER_CMD system prune -af --volumes 2>&1 || true

            # Also purge Docker buildx cache (separate from image layers)
            $DOCKER_CMD builder prune -af 2>&1 || true

            # Aggressive OS-level cleanup
            sudo apt-get clean 2>/dev/null || true
            sudo rm -rf /tmp/* 2>/dev/null || true
            sudo journalctl --vacuum-time=1d 2>/dev/null || true

            df -h / | awk 'NR==1 || NR==2'

            AVAIL_KB=$(df / | awk 'NR==2 {print $4}')
            if [ "$AVAIL_KB" -lt 1048576 ]; then
              echo "⚠️ WARNING: <1GB free (${AVAIL_KB}KB). Image may fail to pull."
            else
              echo "✅ ${AVAIL_KB}KB free — sufficient disk space"
            fi
            echo ""

            # ─── AUTO-RESIZE EBS VOLUME IF SPACE IS LOW ───
            echo "=========================================="
            echo "💽 Step 11j: Auto-resize EBS volume if disk is low"
            echo "=========================================="
            df -h /
            AVAIL_KB=$(df / | awk 'NR==2 {print $4}')
            if [ "$AVAIL_KB" -lt 2097152 ]; then
              echo "⚠️ Less than 2GB free (${AVAIL_KB}KB). Attempting EBS volume resize..."
              INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || \
                            curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" \
                              http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo "")
              if [ -n "$INSTANCE_ID" ]; then
                echo "  🔍 Instance ID: $INSTANCE_ID"
                # Find the root EBS volume
                # Get root device name from instance metadata (most reliable)
                ROOT_DEVICE=$(curl -s http://169.254.169.254/latest/meta-data/block-device-mapping/root 2>/dev/null || echo "xvda")
                ROOT_VOLUME_ID=$(aws ec2 describe-volumes \
                  --filters "Name=attachment.instance-id,Values=$INSTANCE_ID" \
                  --query "Volumes[?contains(['/dev/$ROOT_DEVICE','/dev/sda1','/dev/xvda'], Attachment[0].Device)].[VolumeId,Size]" \
                  --region $AWS_REGION --output text 2>/dev/null)
                if [ -n "$ROOT_VOLUME_ID" ]; then
                  VOL_ID=$(echo "$ROOT_VOLUME_ID" | awk '{print $1}')
                  CURRENT_SIZE=$(echo "$ROOT_VOLUME_ID" | awk '{print $2}')
                  echo "  📀 Root volume: $VOL_ID (${CURRENT_SIZE}GB)"
                  if [ "$CURRENT_SIZE" -lt 20 ]; then
                    echo "  🔧 Resizing $VOL_ID from ${CURRENT_SIZE}GB → 20GB..."
                    MODIFY_RESULT=$(aws ec2 modify-volume \
                      --volume-id "$VOL_ID" --size 20 \
                      --region $AWS_REGION 2>&1)
                    if [ $? -eq 0 ]; then
                      echo "  ✅ Resize initiated! Waiting for completion..."
                      # Wait for resize to complete (usually 30-60s for small increases)
                      for W in 1 2 3 4 5 6; do
                        STATE=$(aws ec2 describe-volumes-modifications \
                          --volume-id "$VOL_ID" \
                          --query "VolumesModifications[0].ModificationState" \
                          --region $AWS_REGION --output text 2>/dev/null)
                        if [ "$STATE" = "completed" ]; then break; fi
                        echo "  ⏳ Waiting for resize... (attempt $W/6)"
                        sleep 10
                      done
                      # Extend filesystem to use new space
                      echo "  🔧 Extending filesystem..."
                      sudo resize2fs $(df / --output=source | tail -1) 2>/dev/null || \
                        sudo xfs_growfs / 2>/dev/null || \
                        echo "  ⚠️ Filesystem extension skipped (manual: sudo resize2fs <device>)"
                      echo ""
                      echo "📊 Disk space AFTER resize:"
                      df -h /
                    else
                      echo "  ⚠️ Volume resize failed: $MODIFY_RESULT"
                      echo "  ℹ️ The IAM role needs ec2:ModifyVolume permission."
                    fi
                  else
                    echo "  ✅ Volume is already ${CURRENT_SIZE}GB — sufficient."
                  fi
                else
                  echo "  ⚠️ Could not determine root volume ID."
                fi
              else
                echo "  ⚠️ Could not retrieve instance ID from metadata."
              fi
            else
              echo "✅ ${AVAIL_KB}KB free — sufficient disk space, no resize needed."
            fi
            echo ""

            # ─── PULL NEW IMAGE ───
            echo "=========================================="
            echo "📥 Step 11k: Pulling new image via docker compose"
            echo "=========================================="
            echo "  Image: $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:$GITHUB_SHA"
            echo ""

            # Retry loop for compose pull
            MAX_PULL_RETRIES=3
            PULL_RETRY_DELAY=15
            PULL_OK=1
            for ATTEMPT in $(seq 1 $MAX_PULL_RETRIES); do
              echo "  🔄 Pull attempt $ATTEMPT/$MAX_PULL_RETRIES..."
              $COMPOSE_CMD pull 2>&1
              if [ $? -eq 0 ]; then
                PULL_OK=0
                echo "  ✅ Pull succeeded on attempt $ATTEMPT!"
                break
              fi
              if [ $ATTEMPT -lt $MAX_PULL_RETRIES ]; then
                echo "  ⏳ Waiting ${PULL_RETRY_DELAY}s before retry..."
                sleep $PULL_RETRY_DELAY
              fi
            done

            if [ $PULL_OK -ne 0 ]; then
              echo "❌ docker compose pull FAILED after $MAX_PULL_RETRIES attempts."
              echo "   Trying to pull :stable (previous successful deploy)..."
              $DOCKER_CMD pull $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:stable 2>&1
              if [ $? -ne 0 ]; then
                echo "❌ :stable pull also failed. No fallback image available."
                exit 1
              fi
              # Re-tag :stable as :latest and this SHA so compose picks it up
              $DOCKER_CMD tag $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:stable \
                $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:$GITHUB_SHA
              $DOCKER_CMD tag $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:stable \
                $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:latest
              echo "⚠️ Deploying :stable as fallback instead of new image"
            fi

            # ─── Verify image digest matches the just-built image ───
            PULLED_DIGEST=$($DOCKER_CMD inspect --format='{{index .RepoDigests 0}}' \
              $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:$GITHUB_SHA \
              2>/dev/null | cut -d'@' -f2 || echo "")
            if [ -n "$PULLED_DIGEST" ] && [ -n "$IMAGE_DIGEST" ]; then
              if [ "$PULLED_DIGEST" != "$IMAGE_DIGEST" ]; then
                echo "❌ DIGEST MISMATCH!"
                echo "   Expected: $IMAGE_DIGEST"
                echo "   Got:      $PULLED_DIGEST"
                echo "   The SHA tag may have been overwritten by another build."
                echo "   Continuing with pulled image anyway..."
              fi
              echo "  ✅ Digest: $PULLED_DIGEST"
            else
              echo "  ⚠️ Skipping digest verification (digest unavailable)"
            fi

            # Also tag pulled image as :latest for convenience
            $DOCKER_CMD tag $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:$GITHUB_SHA \
              $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:latest 2>/dev/null || true
            echo ""

            # ─── COMPOSE UP ───
            echo "=========================================="
            echo "🚀 Step 11l: Starting new containers"
            echo "=========================================="
            # (pgdata password was tested in Step 11g before compose down.
            #  If password mismatch was detected, down -v already deleted the stale volume.)

            echo "🚀 Starting new containers..."
            $COMPOSE_CMD up -d 2>&1
            COMPOSE_EXIT=$?
            if [ $COMPOSE_EXIT -ne 0 ]; then
              echo "⚠️ compose up failed ($COMPOSE_EXIT) — trying direct container launch..."
              $DOCKER_CMD run -d \
                --name idop-app \
                --restart always \
                -p 127.0.0.1:8000:8000 \
                --env-file .env \
                $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:$GITHUB_SHA
              DIRECT_EXIT=$?
              if [ $DIRECT_EXIT -ne 0 ]; then
                echo "❌ Direct launch also failed. Attempting compose up one more time..."
                $COMPOSE_CMD up -d 2>&1 || true
              else
                echo "  ✅ Container launched directly (bypassing compose)"
              fi
            else
              echo "  ✅ Docker compose up successful!"
            fi
            echo ""

            echo "📋 Running containers:"
            $DOCKER_CMD ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"
            echo ""

            # ─── HEALTH CHECK WITH EXTENDED TIMEOUT ───
            echo "=========================================="
            echo "🧪 Step 11m: Health check with retry logic"
            echo "=========================================="
            echo ""
            echo "🏥 Testing FastAPI container health (port 8000)..."
            echo "⏳ Waiting 30s for cold start (Postgres init can take up to 115s)..."
            sleep 30

            API_URL="http://localhost:8000"
            RETRY=0
            # Match the Postgres compose healthcheck timeout (retries: 30 × 5s + 60s start = 210s)
            # App check: 30s initial + 30 retries × 6s = 210s total
            MAX_RETRIES=30
            WAIT_SECONDS=6

            until curl -f -s "$API_URL/health" > /dev/null 2>&1 || [ $RETRY -eq $MAX_RETRIES ]; do
              RETRY=$((RETRY+1))
              echo "   ⚠️ Attempt $RETRY/$MAX_RETRIES failed, retrying in ${WAIT_SECONDS}s..."
              sleep $WAIT_SECONDS
            done

            if [ $RETRY -eq $MAX_RETRIES ]; then
              echo ""
              echo "=========================================="
              echo "❌ HEALTH CHECK FAILED — ROLLING BACK"
              echo "=========================================="
              echo ""
              echo "📋 Container logs (last 50 lines):"
              $DOCKER_CMD logs --tail 50 idop-app 2>&1 || true
              echo ""

              # Rollback: pull :stable from ECR and redeploy
              echo "🔄 Rolling back to :stable image from ECR..."
              $COMPOSE_CMD down 2>/dev/null || true
              $DOCKER_CMD pull $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:stable 2>&1
              ROLLBACK_PULL_EXIT=$?
              if [ $ROLLBACK_PULL_EXIT -ne 0 ]; then
                echo "❌ :stable pull failed. No rollback image available."
                exit 1
              fi
              $DOCKER_CMD tag $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:stable \
                $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:$GITHUB_SHA
              $DOCKER_CMD tag $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:stable \
                $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:latest
              $COMPOSE_CMD up -d 2>&1 || {
                echo "❌ Rollback compose up failed — deploying directly from :stable";
                $DOCKER_CMD rm -f idop-app 2>/dev/null || true;
                $DOCKER_CMD run -d \
                  --name idop-app \
                  --restart always \
                  -p 127.0.0.1:8000:8000 \
                  --env-file .env \
                  $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:stable;
              }
              echo "✅ Rollback complete. Stable state restored."
              exit 1
            fi

            echo "   ✅ FastAPI container is healthy!"
            echo ""
            echo "📋 Health check response:"
            echo "──────────────────────────"
            curl -s "$API_URL/health" | python3 -m json.tool 2>/dev/null || curl -s "$API_URL/health"
            echo ""
            echo "──────────────────────────"
            echo ""

            # ── Test 2: Nginx proxy ──
            echo "🏥 Test 2: Nginx reverse proxy (port 80)..."
            RETRY=0
            MAX_RETRIES=3
            WAIT_SECONDS=3
            until curl -f -s "http://localhost:80/health" > /dev/null 2>&1 || [ $RETRY -eq $MAX_RETRIES ]; do
              RETRY=$((RETRY+1))
              echo "   ⚠️ Attempt $RETRY/$MAX_RETRIES..."
              sleep $WAIT_SECONDS
            done

            if [ $RETRY -eq $MAX_RETRIES ]; then
              echo "   ❌ Nginx health check failed."
            else
              echo "   ✅ Nginx proxying correctly on port 80!"
            fi
            echo ""

      # ─────────────────────────────────────────────────────────────────────
      # STEP 12: POST-DEPLOYMENT SMOKE TESTS
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 12/13: Run post-deployment smoke tests"
        env:
          EXPECTED_GIT_SHA: ${{ github.sha }}
        run: |
          echo "=========================================="
          echo "🧪 DEPLOYMENT INTEGRATION SMOKE TESTS"
          echo "=========================================="
          echo "   Target: ${{ secrets.EC2_HOST }}"
          echo "   SHA:    ${{ github.sha }}"
          echo ""

          python -m pip install --upgrade pip --break-system-packages
          pip install requests pydantic boto3 --break-system-packages

          if [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            export API_TARGET_URL="https://${{ secrets.DOMAIN_NAME }}"
          else
            export API_TARGET_URL="http://${{ secrets.EC2_HOST }}"
          fi

          echo "📡 API Target URL: $API_TARGET_URL"
          echo ""
          python scripts/deploy_smoke.py

      # ─────────────────────────────────────────────────────────────────────
      # STEP 12b: DEPLOYMENT COMPLETION SUMMARY
      # ─────────────────────────────────────────────────────────────────────
      - name: "Step 12b/13: Deployment summary"
        if: success()
        run: |
          echo "=========================================="
          echo "🎉 DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "=========================================="
          echo ""
          echo "📋 Deployment Summary:"
          echo "  Commit      : ${{ github.sha }}"
          echo "  Author      : ${{ github.actor }}"
          echo "  ECR Image   : $RESOLVED_ECR_REGISTRY/$RESOLVED_ECR_REPOSITORY:latest"
          echo "  EC2 Host    : ${{ secrets.EC2_HOST }}"
          echo "  Region      : $AWS_REGION"
          echo "  Status      : ✅ LIVE"
          echo ""
          echo "📋 Verify: curl -f http://\$EC2_HOST/health"
          echo "   Logs:   ssh ubuntu@\$EC2_HOST 'docker logs -f idop-app'"
          echo "=========================================="
