services:

  postgres:
    image: postgres:16
    container_name: idop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - idop-net
    command:
      # Prevent Postgres from closing idle connections — the LangGraph
      # AsyncPostgresSaver uses a persistent connection pool that must
      # stay alive between requests. Default postgres idle timeout kills
      # these connections after ~5 minutes.
      - "postgres"
      - "-c"
      - "idle_in_transaction_session_timeout=0"
      - "-c"
      - "statement_timeout=0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d postgres -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped
    # t2.micro has 1GB RAM — prevent Postgres from starving the app
    mem_limit: 256m
    mem_reservation: 128m

  idop:
    build: .
    container_name: idop-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for Docker networking — inside the container,
      # 'localhost' refers to the container itself, not the host. The Postgres
      # service on the Docker network is reachable by its service name.
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - idop-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-o", "/dev/null", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    # t2.micro has 1GB RAM — memory limits prevent OOM
    # docling + torch REMOVED (2026-06-07) — pypdf is lightweight (~30 MB)
    # so these limits leave ~44MB headroom for OS/kernel on t2.micro (1GB)
    mem_limit: 700m
    mem_reservation: 512m

networks:
  idop-net:
    name: idop-net

volumes:
  postgres_data:
