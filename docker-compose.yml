services:

  postgres:
    image: postgres:16
    container_name: idop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - idop-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -d postgres -Atc 'SELECT pg_is_in_recovery()' | grep -q f 2>/dev/null && psql -U postgres -d postgres -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  idop:
    build: .
    container_name: idop-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    # DATABASE_URL removed — .env handles it. The docker-compose DATABASE_URL
    # overrides the .env file at runtime, breaking local dev setups.
    networks:
      - idop-net
    restart: unless-stopped

networks:
  idop-net:
    name: idop-net

volumes:
  postgres_data:
