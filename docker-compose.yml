services:

  postgres:
    image: postgres:16
    container_name: idop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - idop-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  idop:
    build: .
    container_name: idop-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@idop-postgres:5432/postgres?sslmode=disable
    networks:
      - idop-net
    restart: unless-stopped

networks:
  idop-net:
    name: idop-net

volumes:
  postgres_data:
