[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    asyncio: mark test as async
filterwarnings =
    # StarletteDeprecationWarning is a UserWarning subclass (fastapi/testclient.py)
    ignore::UserWarning:fastapi
    # PydanticDeprecatedSince20 is a DeprecationWarning subclass (vanna)
    ignore::DeprecationWarning:vanna
    # datetime.utcnow() DeprecationWarning from python 3.12+ in pydantic internals
    ignore::DeprecationWarning:pydantic
    # Qdrant insecure connection + server version (UserWarning)
    ignore::UserWarning:qdrant_client
    ignore::UserWarning:app\.core\.vector_store

